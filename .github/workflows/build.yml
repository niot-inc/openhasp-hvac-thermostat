name: Build firmware

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "images/**"
      - "webflash/**"
      - "index.html"
  pull_request:
    paths-ignore:
      - "**.md"
      - "images/**"
      - "webflash/**"
      - "index.html"
  workflow_dispatch:
    inputs:
      deploy:
        description: "빌드 결과를 webflash/에 커밋 (웹 플래셔 배포)"
        type: boolean
        default: true
  release:
    types: [published]

permissions:
  contents: write

env:
  # 오버레이를 얹을 openHASP 버전 (README 빌드 가이드 기준 0.7.0 계열)
  OPENHASP_REF: 0.7.0-rc13
  BUILD_ENV: panlee-zw3d95ce01s-tr-4848_16MB

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout overlay (this repo)
        uses: actions/checkout@v4
        with:
          path: overlay

      - name: Checkout openHASP
        uses: actions/checkout@v4
        with:
          repository: HASwitchPlate/openHASP
          ref: ${{ env.OPENHASP_REF }}
          submodules: true
          path: openhasp
          # tools/auto_firmware_version.py가 git describe로 버전을 뽑으므로 태그 히스토리 필요
          fetch-depth: 0

      - name: Apply overlay onto openHASP tree
        run: |
          cp -v overlay/src/custom/*.cpp overlay/src/custom/*.h openhasp/src/custom/
          cp -v overlay/include/user_config_override.h openhasp/include/
          cp -v overlay/platformio_override.ini openhasp/
          cp -v overlay/data/* openhasp/data/

      - name: Determine firmware version
        id: fwver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git -C overlay rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Inject firmware version into build flags
        run: |
          # [override] build_flags에 SUPERB_FW_VERSION define 추가
          sed -i "0,/^build_flags =/s//build_flags =\n   -D SUPERB_FW_VERSION='\"${{ steps.fwver.outputs.version }}\"'/" openhasp/platformio_override.ini
          grep -A3 "^build_flags" openhasp/platformio_override.ini | head -5

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.OPENHASP_REF }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ env.OPENHASP_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # openHASP tools/auto_firmware_version.py가 pkg_resources를 사용하므로
          # pkg_resources가 제거된 최신 Python/setuptools 조합을 피한다
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          # dulwich: openHASP 빌드 스크립트의 자체 설치 로직이 최신 pip에서 깨지므로 선설치
          pip install --upgrade platformio "setuptools<81" dulwich

      - name: Build firmware
        working-directory: openhasp
        run: pio run -e ${{ env.BUILD_ENV }}

      - name: Build filesystem image
        working-directory: openhasp
        run: pio run -e ${{ env.BUILD_ENV }} -t buildfs

      - name: Collect artifacts
        run: |
          mkdir -p dist
          # full: 부트로더+파티션+앱 병합 이미지 (웹 플래셔가 0번지에 굽는 파일)
          cp openhasp/build_output/firmware/*_full_*.bin dist/firmware_full.bin
          # ota: 앱 전용 이미지 (장치 웹 UI의 OTA 업데이트용)
          cp openhasp/build_output/firmware/*_ota_*.bin dist/firmware_ota.bin
          cp openhasp/.pio/build/${{ env.BUILD_ENV }}/littlefs.bin dist/littlefs.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.BUILD_ENV }}-${{ github.sha }}
          path: dist/*

      # 수동 실행(deploy 체크) 또는 릴리스 발행 시에만 웹 플래셔 배포물 커밋.
      # 각 파일의 용도는 webflash/README.md 참고.
      - name: Deploy to webflash
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
        working-directory: overlay
        env:
          FW_VERSION: ${{ steps.fwver.outputs.version }}
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          cp ../dist/firmware_full.bin webflash/firmware_full.bin
          cp ../dist/firmware_ota.bin  webflash/firmware_ota.bin
          cp ../dist/littlefs.bin      webflash/littlefs.bin
          if [ "${{ github.event_name }}" = "release" ]; then
            python3 - <<'EOF'
          import json, os, subprocess, datetime
          notes = os.environ.get("RELEASE_NOTES", "").strip()
          sha = subprocess.check_output(["git", "rev-parse", "--short", "HEAD"]).decode().strip()
          json.dump({
            "version": os.environ["FW_VERSION"],
            "date": datetime.date.today().isoformat(),
            "sha": sha,
            "notes": notes,
          }, open("webflash/version.json", "w"), ensure_ascii=False, indent=2)
          EOF
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add webflash/
          if git diff --cached --quiet; then
            echo "webflash 변경 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "chore: webflash 펌웨어 갱신 (${GITHUB_EVENT_NAME}, ${GITHUB_SHA::7})"
          # 릴리스 이벤트는 태그(detached HEAD)에서 돌므로 main으로 푸시
          TARGET_BRANCH="${{ github.event_name == 'release' && 'main' || github.ref_name }}"
          git push origin "HEAD:${TARGET_BRANCH}"
